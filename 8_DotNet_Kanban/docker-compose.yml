services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}",
             "-Q", "SELECT 1", "-b", "-No"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ConnectionStrings__Default: "Server=db;Database=KanbanDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ASPNETCORE_URLS: http://+:8000
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  mssql_data:
